<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>memedash 🪙</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
<style>
:root{
  --bg:#0a0b0f; --bg2:#101218; --bg3:#161923; --border:#232734; --border2:#2e3342;
  --text:#e6e8ee; --muted:#8b90a0; --dim:#5c6070;
  --accent:#7c6cff; --green:#3fdd8f; --red:#ff5c6c; --amber:#ffb547;
  --font:'Inter',-apple-system,'Segoe UI',sans-serif;
  --mono:'JetBrains Mono','SF Mono',Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:dark}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13.5px;line-height:1.5}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

.layout{display:flex;min-height:100vh}
.sidebar{width:200px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);
  padding:16px 10px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}
.logo{font-weight:700;font-size:15px;padding:6px 10px 18px;letter-spacing:.3px}
.logo span{color:var(--accent)}
.nav a{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;
  color:var(--muted);font-weight:500;margin-bottom:2px}
.nav a:hover{background:var(--bg3);color:var(--text)}
.nav a.active{background:var(--bg3);color:var(--text);box-shadow:inset 2px 0 0 var(--accent)}
.nav .key{margin-left:auto;font-size:10px;color:var(--dim);border:1px solid var(--border);
  border-radius:4px;padding:0 4px}
.health{margin-top:auto;padding:8px 10px;font-size:11px;color:var(--dim)}
.health .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px}

.main{flex:1;min-width:0;padding:20px 26px 60px}
.topbar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.topbar h1{font-size:17px;font-weight:600;margin-right:auto}
select,input[type=text],input[type=number]{background:var(--bg3);border:1px solid var(--border);
  color:var(--text);border-radius:7px;padding:6px 10px;font-family:inherit;font-size:12.5px;outline:none}
select:focus,input:focus{border-color:var(--accent)}
input[type=text]{width:220px}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.card .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.card .v{font-size:21px;font-weight:650;margin-top:2px;font-variant-numeric:tabular-nums}
.card .v small{font-size:12px;color:var(--muted);font-weight:400}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}.sidebar{display:none}}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.panel h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.chart{height:240px}

table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;text-align:left;
  padding:8px 10px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--text)}
th.sorted{color:var(--accent)}
td{padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;max-width:220px}
tr:hover td{background:var(--bg3)}
tr.click{cursor:pointer}
.num{text-align:right}
th.num{text-align:right}
.pos{color:var(--green)}.neg{color:var(--red)}.warn{color:var(--amber)}
.mono{font-family:var(--mono);font-size:12px}
.badge{display:inline-block;background:var(--bg3);border:1px solid var(--border);border-radius:5px;
  padding:1px 7px;font-size:11px;color:var(--muted)}
.badge.sol{color:#9d7cff;border-color:#3a2f5e}.badge.eth{color:#7cb6ff;border-color:#2b3e5e}
.badge.base{color:#5c8aff;border-color:#243a6e}.badge.bnb{color:#ffd45c;border-color:#5e4f1e}
.badge.rh{color:#5cffb8;border-color:#1e5e43}
.mult{font-weight:600}
.pager{display:flex;gap:8px;align-items:center;margin-top:12px;color:var(--muted);font-size:12px}
.pager button{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;
  padding:5px 12px;cursor:pointer}
.pager button:disabled{opacity:.4;cursor:default}
.empty{color:var(--dim);padding:30px;text-align:center}
.crumb{color:var(--muted);font-size:12px;margin-bottom:4px}
.crumb a{color:var(--accent)}
.links a{margin-right:10px;color:var(--accent);font-size:12px}
.loading{color:var(--dim);padding:40px;text-align:center}

#live{position:fixed;z-index:50;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;
  box-shadow:0 8px 30px rgba(0,0,0,.55);display:flex;flex-direction:column;
  resize:both;overflow:hidden;min-width:240px;min-height:36px}
#live-head{display:flex;align-items:center;gap:7px;padding:7px 10px;cursor:grab;user-select:none;
  border-bottom:1px solid var(--border);font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--muted);touch-action:none}
#live-head .dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{50%{opacity:.25}}
#live-body{flex:1;overflow-y:auto;padding:3px 0}
.live-row{display:flex;gap:7px;align-items:baseline;padding:4px 10px;font-size:12px;white-space:nowrap;overflow:hidden}
.live-row .t{color:var(--dim);font-size:11px;flex-shrink:0;min-width:34px}
.live-row .who{color:var(--muted);overflow:hidden;text-overflow:ellipsis}
.live-row.new{animation:flash 2.5s}
@keyframes flash{0%{background:rgba(124,108,255,.3)}100%{background:transparent}}
#live-collapse{cursor:pointer;background:none;border:none;color:var(--muted);font-size:13px;padding:0 2px}
#live-collapse:hover{color:var(--text)}
#live-mute{margin-left:auto;cursor:pointer;background:none;border:none;font-size:12px;padding:0 2px;filter:grayscale(30%)}
#live-mute:hover{filter:none}

.tabs{display:flex;gap:8px;margin-bottom:10px}
.tab,.ctab{background:var(--bg3);border:1px solid var(--border);color:var(--muted);border-radius:7px;
  padding:5px 14px;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:500}
.tab:hover,.ctab:hover{color:var(--text)}
.tab.active,.ctab.active{color:var(--text);border-color:var(--accent);box-shadow:inset 0 -2px 0 var(--accent)}
.jbtn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);border-radius:5px;
  padding:1px 8px;cursor:pointer;font-size:13px}
.jbtn:hover{color:var(--text);border-color:var(--accent)}
.pfp{width:20px;height:20px;border-radius:50%;vertical-align:-5px;margin-right:6px;background:var(--bg3)}
.vresize{resize:vertical;overflow:auto;min-height:120px}
.vresize thead th{position:sticky;top:0;background:var(--bg2);z-index:2}
.mrow{padding:5px 2px;border-bottom:1px solid var(--border);font-size:12px}
.mrow .t{color:var(--dim);font-size:11px;margin-right:4px}
.mtxt{color:var(--muted);white-space:pre-wrap;word-break:break-word;font-size:11.5px;margin-top:1px}
.socials{margin-top:6px;font-size:11.5px}
.socials a{color:var(--accent)}
#mc-refresh{background:none;border:1px solid var(--border);color:var(--muted);border-radius:5px;
  cursor:pointer;font-size:12px;padding:0 6px;margin-left:6px;vertical-align:1px}
#mc-refresh:hover{color:var(--text);border-color:var(--accent)}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">meme<span>dash</span> 🪙</div>
    <nav class="nav" id="nav">
      <a href="#/" data-page="overview">Overview<span class="key">1</span></a>
      <a href="#/callers" data-page="callers">Callers<span class="key">2</span></a>
      <a href="#/groups" data-page="groups">Groups<span class="key">3</span></a>
      <a href="#/calls" data-page="calls">Explorer<span class="key">4</span></a>
      <a href="#/sources" data-page="sources">Sources<span class="key">5</span></a>
    </nav>
    <div class="health" id="health"><span class="dot"></span>connecting…</div>
  </aside>
  <main class="main">
    <div class="topbar" id="topbar">
      <h1 id="title">Overview</h1>
      <select id="f-days">
        <option value="0.5">Last 12 hours</option>
        <option value="1">Last 24 hours</option>
        <option value="7">Last 7 days</option>
        <option value="30" selected>Last 30 days</option>
        <option value="90">Last 90 days</option>
        <option value="0">All time</option>
      </select>
      <select id="f-chain">
        <option value="">All chains</option>
        <option value="solana">Solana</option>
        <option value="ethereum">ETH</option>
        <option value="base">Base</option>
        <option value="bsc">BNB</option>
        <option value="robinhood">Robinhood</option>
      </select>
      <input type="text" id="f-search" placeholder="Search token / caller / group  ( / )">
    </div>
    <div id="view"><div class="loading">Loading…</div></div>
  </main>
</div>
<script type="module" src="/static/app.js?v=1.32"></script>
</body>
</html>
